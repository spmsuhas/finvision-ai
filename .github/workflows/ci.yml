name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          # CI build uses placeholder env vars so Firebase init doesn't fail
          VITE_FIREBASE_API_KEY: ci_placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci_placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci_placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci_placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: ci_placeholder

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
